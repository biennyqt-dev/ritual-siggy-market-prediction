<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta
      name="description"
      content="SIGGY Prediction Market — live prediction markets and Ritual Chain settlement."
    />
    <title>SIGGY Prediction Market</title>
    <style>
      :root {
        color-scheme: dark;
        font-family: Inter, system-ui, sans-serif;
        background: #06150d;
        color: #ecfff4;
      }

      body {
        display: grid;
        min-height: 100vh;
        margin: 0;
        place-items: center;
      }

      main {
        width: min(620px, calc(100% - 48px));
        padding: 40px;
        border: 1px solid #1d5b3c;
        border-radius: 20px;
        background: #0b2317;
      }

      span {
        color: #62e9a5;
        font-family: ui-monospace, monospace;
        font-size: 12px;
        letter-spacing: 0.12em;
        text-transform: uppercase;
      }

      h1 {
        margin: 14px 0 10px;
        font-size: clamp(32px, 7vw, 58px);
      }

      p {
        color: #aac6b5;
        line-height: 1.7;
      }

      code {
        color: #62e9a5;
      }
    </style>
  </head>
  <body>
    <main>
      <span>Ritual Chain · Prediction intelligence</span>
      <h1>SIGGY</h1>
      <p>
        This repository contains a Next.js dApp in <code>app/</code>. Run
        <code>npm install</code> and <code>npm run dev</code>, then open
        <code>http://127.0.0.1:3000</code>.
      </p>
    </main>
  </body>
</html>
